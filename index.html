<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D0B09" />

    <!-- Primary Meta -->
    <title>Heritage Motors — Royal Enfield Showroom</title>
    <meta name="description" content="Official Royal Enfield dealership. Explore the complete lineup — Classic 350, Himalayan 450, Interceptor 650 and more. Book your test ride today." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Heritage Motors — Royal Enfield Showroom" />
    <meta property="og:description" content="Ride Pure. Since 1901. Explore the Royal Enfield lineup and book your test ride at Heritage Motors." />
    <meta property="og:image" content="/images/og-cover.webp" />
    <meta property="og:url" content="https://heritagemotors.example.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Heritage Motors — Royal Enfield Showroom" />
    <meta name="twitter:description" content="Ride Pure. Since 1901. Explore the Royal Enfield lineup." />
    <meta name="twitter:image" content="/images/og-cover.webp" />

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts: preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: Bebas Neue (display), Playfair Display (serif accent), Inter (body) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,500&display=swap"
      rel="stylesheet"
    />

    <!-- Hero image preload for LCP (Largest Contentful Paint) optimization -->
    <link rel="preload" as="image" href="/images/hero-1.png" type="image/png" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
